apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: Java-test-02-06
  description: Service Java-test-02-06

  annotations:
    github.com/project-slug: BackstageSSPPoC/Java-test-02-06
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: Backstage_SSP_PoC/Java-test-02-06/main
    argocd/app-name: java-test-02-06-dev
    backstage.io/kubernetes-id: Java-test-02-06
    sonarqube.org/project-key: java-test-02-06
    prometheus.io/rule: "kube_pod_container_resource_requests{pod=~'java-test-02-06.*'}|resource,kube_pod_container_status_running{pod=~'java-test-02-06.*'}|container"
    prometheus.io/alert: "all"
    prometheus.io/labels: "namespace=dev"
    # prometheus.io/rule: "kube_pod_container_resource_requests{pod=~'java-test-02-06.*'}|resource,kube_pod_container_status_restarts_total{pod=~'java-test-02-06.*'}|container"
